name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: SSH Debugger
        env:
          MY_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY}}
        run: |
          echo "$MY_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -vvv -i private_key.pem -o STrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }}
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: 'ubuntu' 
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/Smart-Laptop-Monitor

            git fetch origin
            git reset --hard origin/main

            sudo rm -rf /var/www/html/*
            sudo cp -r dashboard/* /var/www/html/

            sudo systemctl restart apache2

            echo "Deployment Successful!"